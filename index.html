<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAGE — Home</title>
  <meta name="description" content="RAGE game — coming soon. Still making it, stand by!">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div class="hero">

    <!-- Game Title -->
    <div class="hero__title" id="gameTitle"></div>
    <script>
      (function() {
        var letters = [
          { name: 'T', variants: 6 },
          { name: 'F', variants: 5 },
          { name: 'M', variants: 5 },
          { name: 'C', variants: 4 }
        ];
        var html = '';
        for (var i = 0; i < letters.length; i++) {
          var pick = Math.floor(Math.random() * letters[i].variants) + 1;
          html += '<img src="assets/img/title/' + letters[i].name + '/' + pick + '.png" alt="' + letters[i].name + '">';
        }
        document.getElementById('gameTitle').innerHTML = html;
      })();
    </script>

    <!-- CTA: Team Button -->
    <div class="cta">
      <a class="cta__link" href="team.html">
        <span class="cta__icon">&#10010;</span>
        <span class="cta__text">
          <span>team button click</span>
          <span>to see team</span>
        </span>
      </a>
    </div>

  </div>

  <!-- Left Cluster: hands behind ➜ window ➜ characters in front -->
  <div class="cluster cluster--left">
    <img class="cluster__hand cluster__hand--top" src="assets/img/hand-top-left.gif" alt="">
    <img class="cluster__hand cluster__hand--bottom" src="assets/img/hand-bottom-left.gif" alt="">
    <div class="win win--img cluster__win">
      <div class="win__bar">
        <span>rm_debug.yy</span>
        <div class="win__controls">
          <div class="win__ctrl-btn win__ctrl-btn--min">&#8212;</div>
          <div class="win__ctrl-btn">&#9633;</div>
          <div class="win__ctrl-btn win__ctrl-btn--close">&#10005;</div>
        </div>
      </div>
      <div class="win__body">
        <img src="assets/img/debug-left.png" alt="Debug preview" loading="lazy">
      </div>
    </div>
    <img class="cluster__char cluster__char--1" src="assets/img/char-left-2.gif" alt="">
    <img class="cluster__char cluster__char--2" src="assets/img/char-left-1.gif" alt="">
  </div>

  <!-- Right Cluster: hands behind ➜ window ➜ characters in front -->
  <div class="cluster cluster--right">
    <img class="cluster__hand cluster__hand--top" src="assets/img/hand-top-right.gif" alt="">
    <img class="cluster__hand cluster__hand--bottom" src="assets/img/hand-bottom-right.gif" alt="">
    <div class="win win--img cluster__win">
      <div class="win__bar">
        <span>rm_debug.yy</span>
        <div class="win__controls">
          <div class="win__ctrl-btn win__ctrl-btn--min">&#8212;</div>
          <div class="win__ctrl-btn">&#9633;</div>
          <div class="win__ctrl-btn win__ctrl-btn--close">&#10005;</div>
        </div>
      </div>
      <div class="win__body">
        <img src="assets/img/debug-right.png" alt="Debug preview" loading="lazy">
      </div>
    </div>
    <img class="cluster__char cluster__char--1" src="assets/img/char-right-1.gif" alt="">
    <img class="cluster__char cluster__char--2" src="assets/img/char-right-2.gif" alt="">
  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
