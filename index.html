<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAGE — Home</title>
  <meta name="description" content="RAGE game — coming soon. Still making it, stand by!">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

  <div class="hero">

    <!-- WIP.txt Window -->
    <div class="win hero__wip">
      <div class="win__bar">
        <span>WIP.txt</span>
        <div class="win__controls">
          <div class="win__ctrl-btn win__ctrl-btn--min">&#8212;</div>
          <div class="win__ctrl-btn">&#9633;</div>
          <div class="win__ctrl-btn win__ctrl-btn--close">&#10005;</div>
        </div>
      </div>
      <div class="win__body">
        <p>still making it!</p>
        <p>stand by!</p>
      </div>
    </div>

    <!-- Left Debug Window -->
    <div class="win win--img hero__debug-left">
      <div class="win__bar">
        <span>rm_debug.yy</span>
        <div class="win__controls">
          <div class="win__ctrl-btn win__ctrl-btn--min">&#8212;</div>
          <div class="win__ctrl-btn">&#9633;</div>
          <div class="win__ctrl-btn win__ctrl-btn--close">&#10005;</div>
        </div>
      </div>
      <div class="win__body">
        <img src="assets/img/debug-left.png" alt="Debug preview" loading="lazy">
      </div>
    </div>

    <!-- Right Debug Window -->
    <div class="win win--img hero__debug-right">
      <div class="win__bar">
        <span>rm_debug.yy</span>
        <div class="win__controls">
          <div class="win__ctrl-btn win__ctrl-btn--min">&#8212;</div>
          <div class="win__ctrl-btn">&#9633;</div>
          <div class="win__ctrl-btn win__ctrl-btn--close">&#10005;</div>
        </div>
      </div>
      <div class="win__body">
        <img src="assets/img/debug-right.png" alt="Debug preview" loading="lazy">
      </div>
    </div>

    <!-- Hands -->
    <div class="hand hand--tl" data-depth="14"><img src="assets/img/hand-top-left.gif" alt=""></div>
    <div class="hand hand--flip hand--bl" data-depth="10"><img src="assets/img/hand-bottom-left.gif" alt=""></div>
    <div class="hand hand--tr" data-depth="14"><img src="assets/img/hand-top-right.gif" alt=""></div>
    <div class="hand hand--flip hand--br" data-depth="10"><img src="assets/img/hand-bottom-right.gif" alt=""></div>

    <!-- Pixel Characters -->
    <div class="char char--l1"><img src="assets/img/char-left-1.gif" alt=""></div>
    <div class="char char--l2"><img src="assets/img/char-left-2.gif" alt=""></div>
    <div class="char char--r1"><img src="assets/img/char-right-1.gif" alt=""></div>
    <div class="char char--r2"><img src="assets/img/char-right-2.gif" alt=""></div>

    <!-- CTA: Team Button -->
    <div class="cta">
      <a class="cta__link" href="team.html">
        <span class="cta__icon">&#10010;</span>
        <span class="cta__text">
          <span>team button click</span>
          <span>to see team</span>
        </span>
      </a>
    </div>

  </div>

  <script src="assets/js/main.js"></script>
</body>
</html>
