<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TFMC — Home</title>
  <meta name="description" content="TFMC game — coming soon. Still making it, stand by!">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=VT323&display=swap">
</head>
<body>

  <!-- Loading overlay -->
  <div class="loader" id="loader">
    <div class="loader__text">Loading...</div>
  </div>

  <div class="hero">

    <!-- Game Title -->
    <div class="hero__title reveal" id="gameTitle"></div>
    <script>
      (function() {
        var letters = [
          { name: 'T', variants: 6 },
          { name: 'F', variants: 5 },
          { name: 'M', variants: 5 },
          { name: 'C', variants: 4 }
        ];

        var container = document.getElementById('gameTitle');
        var loaded = 0;
        var total = letters.length;

        for (var i = 0; i < total; i++) {
          var pick = Math.floor(Math.random() * letters[i].variants) + 1;
          var img = new Image();
          img.alt = letters[i].name;
          img.src = 'assets/img/title/' + letters[i].name + '/' + pick + '.png';
          img.onload = img.onerror = function() {
            loaded++;
            if (loaded === total) {
              container.classList.add('hero__title--loaded');
            }
          };
          container.appendChild(img);
        }
      })();
    </script>

    <!-- CTA: Team Button -->
    <div class="cta reveal">
      <a class="cta__link" href="team.html">
        <span class="cta__icon">&#10010;</span>
        <span class="cta__text">
          <span>team button click</span>
          <span>to see team</span>
        </span>
      </a>
    </div>

  </div>

  <!-- Left Cluster: hands behind ➜ window ➜ characters in front -->
  <div class="cluster cluster--left reveal">
    <img class="cluster__hand cluster__hand--top" src="assets/img/hand-top-left.gif" alt="">
    <img class="cluster__hand cluster__hand--bottom" src="assets/img/hand-bottom-left.gif" alt="">
    <div class="win win--img cluster__win">
      <div class="win__bar">
        <span>rm_debug.yy</span>
        <div class="win__controls">
          <div class="win__ctrl-btn win__ctrl-btn--min">&#8212;</div>
          <div class="win__ctrl-btn">&#9633;</div>
          <div class="win__ctrl-btn win__ctrl-btn--close">&#10005;</div>
        </div>
      </div>
      <div class="win__body">
        <img src="assets/img/debug-left.png" alt="Debug preview" loading="lazy">
      </div>
    </div>
    <img class="cluster__char cluster__char--1" src="assets/img/char-left-2.gif" alt="">
    <img class="cluster__char cluster__char--2" src="assets/img/char-left-1.gif" alt="">
  </div>

  <!-- Right Cluster: hands behind ➜ window ➜ characters in front -->
  <div class="cluster cluster--right reveal">
    <img class="cluster__hand cluster__hand--top" src="assets/img/hand-top-right.gif" alt="">
    <img class="cluster__hand cluster__hand--bottom" src="assets/img/hand-bottom-right.gif" alt="">
    <div class="win win--img cluster__win">
      <div class="win__bar">
        <span>rm_debug.yy</span>
        <div class="win__controls">
          <div class="win__ctrl-btn win__ctrl-btn--min">&#8212;</div>
          <div class="win__ctrl-btn">&#9633;</div>
          <div class="win__ctrl-btn win__ctrl-btn--close">&#10005;</div>
        </div>
      </div>
      <div class="win__body">
        <img src="assets/img/debug-right.png" alt="Debug preview" loading="lazy">
      </div>
    </div>
    <img class="cluster__char cluster__char--1" src="assets/img/char-right-1.gif" alt="">
    <img class="cluster__char cluster__char--2" src="assets/img/char-right-2.gif" alt="">
  </div>

  <!-- Secret button (positioned over left window) -->
  <button class="secret-btn" id="secretBtn">
    <span class="secret-btn__clue"></span>
  </button>

  <!-- Terminal window (hidden) -->
  <div class="term-backdrop" id="termBackdrop">
    <div class="win term-win" id="terminal">
      <div class="win__bar term-win__bar">
        <span>C:\WINDOWS\system32\cmd.exe</span>
        <div class="win__controls">
          <div class="win__ctrl-btn win__ctrl-btn--min" id="termMin">&#8212;</div>
          <div class="win__ctrl-btn">&#9633;</div>
          <div class="win__ctrl-btn win__ctrl-btn--close" id="termClose">&#10005;</div>
        </div>
      </div>
      <div class="term-body">
        <div class="term-body__screen" id="termScreen"></div>
        <div class="term-body__input-line" id="termInputLine" style="display:none;">
          <span class="term-body__prompt">C:\&gt;</span>
          <input class="term-body__input" id="termInput" type="text" spellcheck="false" autocomplete="off">
        </div>
      </div>
    </div>
  </div>

  <script src="assets/js/terminal.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
